---
- name: database_engine | django.db.backends.postgresql | Retrieve list of missing required packages for postgresql
  ansible.builtin.set_fact:
    _postgresql_missing_packages: "{{ ara_api_postgresql_packages | difference(ansible_facts['packages'].keys()) }}"

- name: database_engine | django.db.backends.postgresql | Elevate privileges
  when: _postgresql_missing_packages | length > 0
  block:
    - name: database_engine | django.db.backends.postgresql | Install required packages
      become: true
      ansible.builtin.package:
        name: "{{ ara_api_postgresql_packages }}"
        state: present
  rescue:
    - name: database_engine | django.db.backends.postgresql | Fail due to missing packages
      ansible.builtin.fail:
        msg: |
          failed to elevate privileges and install missing required packages.

          Install the following packages before running this role again:

          {{ _postgresql_missing_packages | join(' ') }}

- name: database_engine | django.db.backends.postgresql | Ensure psycopg2 is installed
  ansible.builtin.pip:
    name: psycopg2
    state: present
    virtualenv: "{{ ara_api_venv | bool | ternary(ara_api_venv_path, omit) }}"
    virtualenv_command: /usr/bin/python3 -m venv

- name: database_engine | django.db.backends.postgresql | Run SQL migrations
  environment:
    ARA_SETTINGS: "{{ ara_api_settings }}"
    PATH: "{{ path_with_virtualenv }}"
  ansible.builtin.command: ara-manage migrate
  run_once: true
  register: _ara_sql_migrations
  retries: 3
  delay: 5
  until: _ara_sql_migrations is succeeded
  changed_when: '"No migrations to apply" not in _ara_sql_migrations.stdout'
